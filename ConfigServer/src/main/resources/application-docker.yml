server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
      server:
        git:
          uri: https://github.com/HBirdman/UserPlatformConfig
          default-label: main

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false